<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader - 下载</title>
  <link rel="stylesheet" href="download.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Video Downloader</h1>
    </header>

    <main class="main">
      <!-- 视频预览 -->
      <div class="preview">
        <video id="video-player" controls></video>
      </div>

      <!-- 文件信息 -->
      <div class="file-info">
        <div class="info-row">
          <span class="label">文件名</span>
          <span id="file-name" class="value">-</span>
        </div>
        <div class="info-row">
          <span class="label">源格式</span>
          <span id="file-format" class="value">-</span>
        </div>
        <div class="info-row">
          <span class="label">大小</span>
          <span id="file-size" class="value">-</span>
        </div>
        <div class="info-row">
          <span class="label">时长</span>
          <span id="file-duration" class="value">-</span>
        </div>
      </div>

      <!-- 格式选择 -->
      <div id="format-section" class="format-section">
        <div class="format-label">输出格式</div>
        <div class="format-options">
          <label class="format-option">
            <input type="radio" name="output-format" value="keep" checked>
            <span class="format-badge">保持原格式</span>
          </label>
          <label class="format-option">
            <input type="radio" name="output-format" value="mp4">
            <span class="format-badge">MP4</span>
          </label>
          <label class="format-option">
            <input type="radio" name="output-format" value="webm">
            <span class="format-badge">WebM</span>
          </label>
          <label class="format-option">
            <input type="radio" name="output-format" value="mov">
            <span class="format-badge">MOV</span>
          </label>
          <label class="format-option">
            <input type="radio" name="output-format" value="avi">
            <span class="format-badge">AVI</span>
          </label>
          <label class="format-option">
            <input type="radio" name="output-format" value="mkv">
            <span class="format-badge">MKV</span>
          </label>
        </div>
      </div>

      <!-- 下载进度 -->
      <div id="progress-section" class="progress-section">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-info">
          <span id="progress-text">准备下载...</span>
          <span id="progress-percent">0%</span>
        </div>
      </div>

      <!-- 转码进度 -->
      <div id="convert-section" class="progress-section hidden">
        <div class="progress-bar">
          <div id="convert-fill" class="progress-fill convert" style="width: 0%"></div>
        </div>
        <div class="progress-info">
          <span id="convert-text">准备转码...</span>
          <span id="convert-percent">0%</span>
        </div>
      </div>

      <!-- 错误信息 -->
      <div id="error-section" class="error-section hidden">
        <p id="error-message"></p>
        <button id="btn-retry" class="btn-primary">重试</button>
      </div>

      <!-- 保存按钮 -->
      <div class="actions">
        <button id="btn-save" class="btn-save" disabled>
          保存到本地
        </button>
      </div>
    </main>
  </div>

  <!-- ffmpeg.wasm 从 CDN 加载 -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
  <script src="download.js"></script>
</body>
</html>
